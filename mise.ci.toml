# CI-only mise tasks. Load with MISE_ENV=ci or: mise run -E ci …
# Workflows: checkout → mise-action → cache → mise run -E ci <task>.

[tasks."ci:tools"]
description = "Install pinned protoc (+ ripgrep on macOS) for builds"
run = "bash mise-tasks/ci/tools"

[tasks."ci:check-pager"]
description = "cargo check -p xai-grok-pager-bin (PR lane; not release)"
run = """
#!/usr/bin/env bash
set -euo pipefail
root=$(git rev-parse --show-toplevel)
# shellcheck disable=SC1091
source "$root/mise-tasks/ci/tools"
cargo check --locked -p xai-grok-pager-bin
"""

[tasks."ci:clippy-pager"]
description = "cargo clippy -p xai-grok-pager-bin -D warnings"
run = """
#!/usr/bin/env bash
set -euo pipefail
root=$(git rev-parse --show-toplevel)
# shellcheck disable=SC1091
source "$root/mise-tasks/ci/tools"
cargo clippy --locked -p xai-grok-pager-bin -- -D warnings
"""

[tasks."ci:release-pager"]
description = "cargo build --release -p xai-grok-pager-bin (ship lane; macOS)"
run = """
#!/usr/bin/env bash
set -euo pipefail
root=$(git rev-parse --show-toplevel)
# shellcheck disable=SC1091
source "$root/mise-tasks/ci/tools"
: "${CARGO_TARGET_DIR:=${RUNNER_TEMP:-/tmp}/grok-target}"
export CARGO_TARGET_DIR
mkdir -p "$CARGO_TARGET_DIR"
cargo build --locked -p xai-grok-pager-bin --release
test -x "$CARGO_TARGET_DIR/release/xai-grok-pager"
"""

[tasks."ci:package-smoke"]
description = "Tar release binary + e2e install script smoke (macOS)"
run = "bash mise-tasks/ci/package-smoke"
