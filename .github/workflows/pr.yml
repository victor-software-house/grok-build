name: PR

# Fast lane: Linux cargo check on the composition root. Not a release build.
# Ship binaries: workflow_dispatch → build-macos-arm64.yml (macOS only).

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "clippy.toml"
      - "crates/**"
      - "prod/**"
      - "bin/**"
      - "third_party/**"
      - "mise.toml"
      - "mise.lock"
      - "mise-tasks/ci/**"
      - ".github/workflows/pr.yml"

permissions:
  contents: read

concurrency:
  group: pr-rust-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-pager:
    name: cargo check pager-bin
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Rust toolchain (rust-toolchain.toml)
        run: rustup show

      - name: Restore Cargo caches
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: pr-pager-bin
          cache-on-failure: true

      - name: cargo check -p xai-grok-pager-bin
        run: mise run ci:check-pager
