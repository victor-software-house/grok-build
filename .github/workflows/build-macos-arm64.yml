name: Build macOS arm64

# Ship lane only: compile this repo at source_ref on macOS arm64.
# PR compile-check is Linux (pr.yml). Do not use this workflow for day-to-day check.

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: >-
          Branch, tag, or commit SHA to build. Empty = tip of the branch
          you started the workflow from (github.sha).
        required: false
        default: ""
        type: string
      package:
        description: Run package + installer smoke after build
        required: true
        default: true
        type: boolean
      publish:
        description: Publish a prerelease (requires package=true)
        required: true
        default: false
        type: boolean
      version:
        description: GitHub Release tag (vX.Y.Z-vsh.N)
        required: true
        default: v0.0.0-vsh.0
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    build-macos-arm64-${{ github.workflow }}-${{ inputs.source_ref || github.sha }}-${{ inputs.version }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: ${{ inputs.version }}
  MISE_ENV: ci

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.sha }}

      - name: Resolve source tip
        id: resolve
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          sha=$(git rev-parse HEAD)
          printf 'source_sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
          printf 'SOURCE_SHA=%s\n' "$sha" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cargo/registry" "$HOME/.cargo/git" "$RUNNER_TEMP/grok-target" "$RUNNER_TEMP/raw"
          printf 'CARGO_TARGET_DIR=%s/grok-target\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"
          rustc --version
          cargo --version
          printf 'Building %s @ %s (requested %s)\n' \
            "$GITHUB_REPOSITORY" "$sha" "${{ inputs.source_ref || github.sha }}"

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Restore Cargo dependency cache
        id: deps_cache_restore
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-26-arm64-rust-1.92.0-deps-${{ hashFiles('Cargo.lock') }}

      - name: Restore target cache
        id: target_cache_restore
        continue-on-error: true
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ runner.temp }}/grok-target
          key: macos-26-arm64-rust-1.92.0-target-${{ steps.resolve.outputs.source_sha }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            macos-26-arm64-rust-1.92.0-target-

      - name: Tools + release build
        run: mise run -E ci ci:release-pager

      - name: Stage raw binary artifact
        run: |
          set -euo pipefail
          raw="$RUNNER_TEMP/raw"
          artifact="$CARGO_TARGET_DIR/release/xai-grok-pager"
          mkdir -p "$raw"
          "$artifact" --version | tee "$raw/version.txt"
          "$artifact" --help > "$raw/help.txt"
          file "$artifact" | tee "$raw/file.txt"
          file "$artifact" | grep -q 'Mach-O 64-bit executable arm64'
          otool -L "$artifact" | tee "$raw/otool.txt"
          shasum -a 256 "$artifact" | tee "$raw/sha256.txt"
          stat -f '%z bytes' "$artifact" | tee "$raw/size.txt"
          cp "$artifact" "$raw/xai-grok-pager"
          printf '%s\n' "$SOURCE_SHA" > "$raw/source-commit.txt"
          printf '%s\n' "${{ inputs.source_ref || github.sha }}" > "$raw/source-ref.txt"

      - name: Upload raw compiled binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grok-build-raw-macos-arm64
          path: ${{ runner.temp }}/raw
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Save Cargo dependency cache
        if: steps.deps_cache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-26-arm64-rust-1.92.0-deps-${{ hashFiles('Cargo.lock') }}

      - name: Measure target cache candidate
        id: target_cache_size
        run: |
          set -euo pipefail
          kib=$(du -sk "$CARGO_TARGET_DIR" | awk '{ print $1 }')
          bytes=$((kib * 1024))
          printf 'bytes=%s\n' "$bytes" | tee -a "$GITHUB_OUTPUT"
          if [ "$bytes" -le 6442450944 ]; then
            printf 'save=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'save=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Save target cache
        if: steps.target_cache_restore.outputs.cache-hit != 'true' && steps.target_cache_size.outputs.save == 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/grok-target
          key: macos-26-arm64-rust-1.92.0-target-${{ steps.resolve.outputs.source_sha }}-${{ hashFiles('Cargo.lock') }}

      - name: Clean build intermediates
        if: always()
        run: rm -rf "${CARGO_TARGET_DIR:-$RUNNER_TEMP/grok-target}"

  package:
    if: inputs.package
    needs: build
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.sha }}

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: grok-build-raw-macos-arm64
          path: ${{ runner.temp }}/raw

      - name: Package + installer smoke
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          mise run -E ci ci:package-smoke

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grok-build-release-assets
          path: ${{ runner.temp }}/release
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    if: inputs.publish && inputs.package
    needs: [build, package]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: grok-build-release-assets
          path: release

      - name: Publish prerelease for the built commit
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-vsh\.[0-9]+$ ]]
          gh api "repos/$GITHUB_REPOSITORY/git/commits/$SOURCE_SHA" --jq .sha \
            | grep -qx "$SOURCE_SHA"
          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            printf 'Release %s already exists\n' "$RELEASE_VERSION" >&2
            exit 1
          fi
          short_sha=$(printf '%.8s' "$SOURCE_SHA")
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Source-built Grok Build CLI for macOS arm64 (this fork).

          - Source: \`$GITHUB_REPOSITORY@$SOURCE_SHA\`
          - Requested ref: \`${{ inputs.source_ref || github.sha }}\`
          - Built on GitHub-hosted macos-26 (Apple Silicon)
          - Canonical binary: xai-grok-pager
          - Installed command: grok (relative symlink)
          - Status: prerelease

          Install:

          \`\`\`sh
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_VERSION/install-github-release.sh | sh
          \`\`\`

          Override the user-writable prefix with \`GROK_BUILD_PREFIX=/path\`.
          EOF
          gh release create "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SOURCE_SHA" \
            --title "Grok Build $RELEASE_VERSION ($short_sha)" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --prerelease \
            release/*
