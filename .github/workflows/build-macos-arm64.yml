name: Build macOS arm64

# Builds a chosen ref of *this* fork (branch, tag, or commit SHA).
# Not an upstream pin. Manual release packaging.

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: >-
          Branch, tag, or commit SHA to build. Empty = tip of the branch
          you started the workflow from (github.sha).
        required: false
        default: ""
        type: string
      publish:
        description: Publish a prerelease after build and installer checks pass
        required: true
        default: false
        type: boolean
      version:
        description: GitHub Release tag (vX.Y.Z-vsh.N)
        required: true
        default: v0.0.0-vsh.0
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    build-macos-arm64-${{ github.workflow }}-${{ inputs.source_ref || github.sha }}-${{ inputs.version }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # 0 so arbitrary SHAs (not only branch tips) resolve.
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.sha }}

      - name: Resolve source tip
        id: resolve
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          sha=$(git rev-parse HEAD)
          printf 'source_sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
          printf 'SOURCE_SHA=%s\n' "$sha" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cargo/registry" "$HOME/.cargo/git" "$RUNNER_TEMP/grok-target"
          printf 'CARGO_TARGET_DIR=%s/grok-target\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"
          uname -a
          rustc --version
          cargo --version
          df -h "$RUNNER_TEMP"
          printf 'checkout_ref_input=%s\n' "${{ inputs.source_ref }}"
          printf 'Building %s @ %s (requested %s)\n' \
            "$GITHUB_REPOSITORY" "$sha" "${{ inputs.source_ref || github.sha }}"

      - name: Restore Cargo dependency cache
        id: deps_cache_restore
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-26-arm64-rust-1.92.0-deps-${{ hashFiles('Cargo.lock') }}

      - name: Restore target cache
        id: target_cache_restore
        continue-on-error: true
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ runner.temp }}/grok-target
          key: macos-26-arm64-rust-1.92.0-target-${{ steps.resolve.outputs.source_sha }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            macos-26-arm64-rust-1.92.0-target-

      - name: Resolve pinned build tools without Homebrew
        run: |
          set -euo pipefail
          tools="$RUNNER_TEMP/tools"
          mkdir -p "$tools"

          protoc_zip="$tools/protoc.zip"
          curl -fsSL \
            https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-osx-aarch_64.zip \
            -o "$protoc_zip"
          test "$(shasum -a 256 "$protoc_zip" | awk '{print $1}')" = \
            2b8a3403cd097f95f3ba656e14b76c732b6b26d7f183330b11e36ef2bc028765
          unzip -q "$protoc_zip" -d "$tools/protoc"

          rg_archive="$tools/ripgrep.tar.gz"
          curl -fsSL \
            https://github.com/BurntSushi/ripgrep/releases/download/15.0.0/ripgrep-15.0.0-aarch64-apple-darwin.tar.gz \
            -o "$rg_archive"
          test "$(shasum -a 256 "$rg_archive" | awk '{print $1}')" = \
            98bb2e61e7277ba0ea72d2ae2592497fd8d2940934a16b122448d302a6637e3b
          tar -xzf "$rg_archive" -C "$tools"
          rg="$tools/ripgrep-15.0.0-aarch64-apple-darwin/rg"
          test -x "$rg"
          {
            printf 'PROTOC=%s\n' "$tools/protoc/bin/protoc"
            printf 'GROK_SHELL_BUNDLE_RG_PATH=%s\n' "$rg"
            printf 'GROK_TOOLS_BUNDLE_RG_PATH=%s\n' "$rg"
          } >> "$GITHUB_ENV"
          "$tools/protoc/bin/protoc" --version
          "$rg" --version
          df -h "$RUNNER_TEMP"

      - name: Build release CLI
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          cargo build --locked -p xai-grok-pager-bin --release
          test -x "$CARGO_TARGET_DIR/release/xai-grok-pager"
          df -h "$RUNNER_TEMP"

      - name: Smoke and upload raw binary
        run: |
          set -euo pipefail
          artifact="$CARGO_TARGET_DIR/release/xai-grok-pager"
          raw="$RUNNER_TEMP/raw"
          mkdir -p "$raw"
          "$artifact" --version | tee "$raw/version.txt"
          "$artifact" --help > "$raw/help.txt"
          file "$artifact" | tee "$raw/file.txt"
          file "$artifact" | grep -q 'Mach-O 64-bit executable arm64'
          otool -L "$artifact" | tee "$raw/otool.txt"
          shasum -a 256 "$artifact" | tee "$raw/sha256.txt"
          stat -f '%z bytes' "$artifact" | tee "$raw/size.txt"
          cp "$artifact" "$raw/xai-grok-pager"
          printf '%s\n' "$SOURCE_SHA" > "$raw/source-commit.txt"
          printf '%s\n' "${{ inputs.source_ref || github.sha }}" > "$raw/source-ref.txt"

      - name: Upload raw compiled binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grok-build-raw-macos-arm64
          path: ${{ runner.temp }}/raw
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Save Cargo dependency cache
        if: steps.deps_cache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-26-arm64-rust-1.92.0-deps-${{ hashFiles('Cargo.lock') }}

      - name: Measure target cache candidate
        id: target_cache_size
        run: |
          set -euo pipefail
          kib=$(du -sk "$CARGO_TARGET_DIR" | awk '{ print $1 }')
          bytes=$((kib * 1024))
          printf 'bytes=%s\n' "$bytes" | tee -a "$GITHUB_OUTPUT"
          if [ "$bytes" -le 6442450944 ]; then
            printf 'save=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'save=false\n' >> "$GITHUB_OUTPUT"
            printf 'Skipping target cache: %s bytes exceeds 6 GiB limit; dependency cache remains enabled.\n' "$bytes"
          fi

      - name: Save target cache
        if: steps.target_cache_restore.outputs.cache-hit != 'true' && steps.target_cache_size.outputs.save == 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/grok-target
          key: macos-26-arm64-rust-1.92.0-target-${{ steps.resolve.outputs.source_sha }}-${{ hashFiles('Cargo.lock') }}

      - name: Clean build intermediates
        if: always()
        run: rm -rf "${CARGO_TARGET_DIR:-$RUNNER_TEMP/grok-target}"

  package:
    needs: build
    runs-on: macos-26
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.source_ref || github.sha }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: grok-build-raw-macos-arm64
          path: raw

      - name: Package and test installer end to end
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-vsh\.[0-9]+$ ]]
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$(cat raw/source-commit.txt)" = "$SOURCE_SHA"
          test "$(shasum -a 256 raw/xai-grok-pager | awk '{print $1}')" = \
            "$(awk '{print $1}' raw/sha256.txt)"
          chmod 0755 raw/xai-grok-pager
          file raw/xai-grok-pager | grep -q 'Mach-O 64-bit executable arm64'
          raw/xai-grok-pager --version

          version_no_v=${RELEASE_VERSION#v}
          package_name="grok-build-${version_no_v}-macos-arm64"
          package_root="$RUNNER_TEMP/package/$package_name"
          release_root="$RUNNER_TEMP/release"
          mkdir -p "$package_root" "$release_root"
          cp raw/xai-grok-pager "$package_root/xai-grok-pager"
          cp raw/version.txt raw/help.txt raw/file.txt raw/otool.txt raw/size.txt "$package_root/"
          ln -s xai-grok-pager "$package_root/grok"
          printf '%s\n' "$SOURCE_SHA" > "$package_root/source-commit.txt"
          tar -C "$RUNNER_TEMP/package" -czf "$release_root/$package_name.tar.gz" "$package_name"
          sed "s/__RELEASE_VERSION__/$RELEASE_VERSION/" \
            scripts/install-github-release.sh > "$release_root/install-github-release.sh"
          chmod 0755 "$release_root/install-github-release.sh"
          sh -n "$release_root/install-github-release.sh"
          if grep -q '__RELEASE_VERSION__' "$release_root/install-github-release.sh"; then
            printf '%s\n' 'Installer version placeholder was not replaced.' >&2
            exit 1
          fi
          (cd "$release_root" && shasum -a 256 "$package_name.tar.gz" > SHA256SUMS)

          server_log="$RUNNER_TEMP/installer-http.log"
          python3 -m http.server 8765 --bind 127.0.0.1 --directory "$release_root" > "$server_log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          sleep 1
          install_prefix="$RUNNER_TEMP/install-proof"
          GROK_BUILD_BASE_URL=http://127.0.0.1:8765 \
            GROK_BUILD_PREFIX="$install_prefix" \
            sh "$release_root/install-github-release.sh"
          test -x "$install_prefix/bin/xai-grok-pager"
          test "$(readlink "$install_prefix/bin/grok")" = xai-grok-pager
          "$install_prefix/bin/grok" --version
          rm -f "$install_prefix/bin/grok" "$install_prefix/bin/xai-grok-pager"
          test ! -e "$install_prefix/bin/grok"
          test ! -e "$install_prefix/bin/xai-grok-pager"
          kill "$server_pid"
          wait "$server_pid" 2>/dev/null || true
          trap - EXIT

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: grok-build-release-assets
          path: ${{ runner.temp }}/release
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build, package]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: grok-build-release-assets
          path: release

      - name: Publish prerelease for the built commit
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-vsh\.[0-9]+$ ]]
          gh api "repos/$GITHUB_REPOSITORY/git/commits/$SOURCE_SHA" --jq .sha \
            | grep -qx "$SOURCE_SHA"
          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            printf 'Release %s already exists\n' "$RELEASE_VERSION" >&2
            exit 1
          fi
          short_sha=$(printf '%.8s' "$SOURCE_SHA")
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Source-built Grok Build CLI for macOS arm64 (this fork).

          - Source: \`$GITHUB_REPOSITORY@$SOURCE_SHA\`
          - Requested ref: \`${{ inputs.source_ref || github.sha }}\`
          - Built on GitHub-hosted macos-26 (Apple Silicon)
          - Canonical binary: xai-grok-pager
          - Installed command: grok (relative symlink)
          - Status: prerelease

          Install:

          \`\`\`sh
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_VERSION/install-github-release.sh | sh
          \`\`\`

          Override the user-writable prefix with \`GROK_BUILD_PREFIX=/path\`.
          EOF
          gh release create "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$SOURCE_SHA" \
            --title "Grok Build $RELEASE_VERSION ($short_sha)" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --prerelease \
            release/*
